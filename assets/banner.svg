<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" role="img" aria-label="THE FABLE MASTERCLASS — Engineering Principles for Masters in the Making">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="55%" stop-color="#101a2e"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5d67b"/>
      <stop offset="50%" stop-color="#e8b84a"/>
      <stop offset="100%" stop-color="#c98f2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.7">
      <stop offset="0%" stop-color="#e8b84a" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#e8b84a" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#e8b84a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#glow)"/>

  <!-- the Loop: the circle that IS the craft -->
  <g opacity="0.55">
    <circle cx="1070" cy="170" r="118" fill="none" stroke="url(#gold)" stroke-width="1.6" stroke-dasharray="4 7"/>
    <circle cx="1070" cy="170" r="86" fill="none" stroke="#7ea6e0" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="3 6"/>
    <circle cx="1070" cy="170" r="54" fill="none" stroke="url(#gold)" stroke-width="1.2" stroke-dasharray="2 5"/>
    <circle cx="1070" cy="52" r="5" fill="#e8b84a"/>
    <circle cx="1156" cy="170" r="4" fill="#7ea6e0"/>
    <circle cx="1070" cy="224" r="3.4" fill="#e8b84a"/>
    <text x="1070" y="166" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#cdb87a" font-style="italic">the circle</text>
    <text x="1070" y="188" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#cdb87a" font-style="italic">IS the craft</text>
  </g>

  <!-- attention rays -->
  <g stroke="#7ea6e0" stroke-opacity="0.18" stroke-width="1">
    <line x1="0" y1="300" x2="920" y2="60"/>
    <line x1="0" y1="330" x2="920" y2="150"/>
    <line x1="0" y1="260" x2="880" y2="30"/>
  </g>

  <text x="72" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="21" letter-spacing="10" fill="#8ea8cf">A  FRONTIER  MODEL'S</text>
  <text x="70" y="182" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="bold" fill="url(#gold)">THE FABLE MASTERCLASS</text>
  <text x="72" y="228" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-style="italic" fill="#c9d6ea">Engineering Principles for Masters in the Making</text>

  <g font-family="Verdana, Geneva, sans-serif" font-size="15" fill="#9db3d4">
    <text x="72" y="284">16 CHAPTERS&#160;&#160;·&#160;&#160;16 LAWS&#160;&#160;·&#160;&#160;6 CHECKLISTS&#160;&#160;·&#160;&#160;written by Claude Fable 5, distilled for every smaller mind</text>
  </g>

  <rect x="72" y="248" width="560" height="2" fill="url(#gold)" opacity="0.65"/>
</svg>
