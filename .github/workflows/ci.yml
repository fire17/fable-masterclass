name: ci
on: [push, pull_request]
jobs:
  verify:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: installer syntax check
        run: sh -n install.sh
      - name: every skill reference lands in the book
        run: sh scripts/verify_refs.sh .
      - name: installer end-to-end into a scratch skills dir
        run: |
          CLAUDE_SKILLS_DIR="$RUNNER_TEMP/skills" sh install.sh
          test -f "$RUNNER_TEMP/skills/fable_masterclass/SKILL.md"
          test -f "$RUNNER_TEMP/skills/fable_masterclass/Fable-Masterclass.md"
          sh scripts/verify_refs.sh "$RUNNER_TEMP/skills/fable_masterclass"
